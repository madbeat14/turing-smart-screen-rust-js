<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src ipc: https://ipc.localhost" />
  <title>Settings — Turing Smart Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #00d4ff;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
    }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 14px;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #00d4ff;
    }
    .row {
      display: flex;
      gap: 16px;
    }
    .row .form-group { flex: 1; }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-group input[type="range"] {
      flex: 1;
      accent-color: #00d4ff;
    }
    .slider-group .value {
      width: 40px;
      text-align: right;
      font-size: 14px;
      color: #00d4ff;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      accent-color: #00d4ff;
      width: 16px;
      height: 16px;
    }
    .checkbox-group label {
      display: inline;
      color: #e0e0e0;
      font-size: 14px;
      margin-bottom: 0;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    button {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-save {
      background: #00d4ff;
      color: #1a1a2e;
      font-weight: 600;
    }
    .btn-save:hover { background: #00b8d9; }
    .btn-cancel {
      background: #333;
      color: #e0e0e0;
    }
    .btn-cancel:hover { background: #444; }
    .btn-apply {
      background: #4caf50;
      color: #fff;
      font-weight: 600;
    }
    .btn-apply:hover { background: #43a047; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      text-align: right;
      min-height: 20px;
    }
    .status.success { color: #4caf50; }
    .status.error { color: #f44336; }
    .btn-editor {
      padding: 8px 12px;
      background: #333;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-editor:hover { background: #444; }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="row">
    <div class="form-group">
      <label for="com-port">COM Port</label>
      <select id="com-port">
        <option value="AUTO">AUTO (detect)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="revision">Display Revision</label>
      <select id="revision">
        <option value="A">A — Turing 3.5"</option>
        <option value="B">B — XuanFang 3.5"</option>
        <option value="C">C — Turing 2"/5"/8.8"</option>
        <option value="D">D — Kipye Qiye 3.5"</option>
        <option value="WEACT_A">WeAct A — 3.5"</option>
        <option value="WEACT_B">WeAct B — 0.96"</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="brightness">Brightness</label>
    <div class="slider-group">
      <input type="range" id="brightness" min="0" max="100" value="20" />
      <span class="value" id="brightness-value">20%</span>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="display-reverse" />
        <label for="display-reverse">Reverse display orientation</label>
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="reset-on-startup" checked />
        <label for="reset-on-startup">Reset display on startup</label>
      </div>
    </div>
  </div>

  <div class="form-group">
    <div class="checkbox-group">
      <input type="checkbox" id="start-on-boot" />
      <label for="start-on-boot">Start on Boot</label>
    </div>
  </div>

  <div class="form-group">
    <label for="theme">Template</label>
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="theme" style="flex:1;">
        <option value="v1">v1 — Simple</option>
        <option value="v2">v2 — Sparklines &amp; State Colors</option>
      </select>
      <button class="btn-editor" id="btn-editor" title="Open Template Editor">Edit</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn-cancel" id="btn-cancel">Cancel</button>
    <button class="btn-save" id="btn-save">Save</button>
    <button class="btn-apply" id="btn-apply">Save &amp; Apply</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    const { invoke } = window.__TAURI__.core;

    const $comPort = document.getElementById('com-port');
    const $revision = document.getElementById('revision');
    const $brightness = document.getElementById('brightness');
    const $brightnessValue = document.getElementById('brightness-value');
    const $displayReverse = document.getElementById('display-reverse');
    const $resetOnStartup = document.getElementById('reset-on-startup');
    const $theme = document.getElementById('theme');
    const $status = document.getElementById('status');

    const $startOnBoot = document.getElementById('start-on-boot');

    $brightness.addEventListener('input', () => {
      $brightnessValue.textContent = $brightness.value + '%';
    });

    // Start on Boot — applied immediately (not part of config save)
    invoke('get_run_on_startup')
      .then(enabled => { $startOnBoot.checked = enabled; })
      .catch(e => showStatus('Failed to read startup setting: ' + e, true));

    $startOnBoot.addEventListener('change', async () => {
      try {
        await invoke('set_run_on_startup', { enable: $startOnBoot.checked });
        showStatus($startOnBoot.checked ? 'Start on Boot enabled' : 'Start on Boot disabled', false);
      } catch (e) {
        showStatus('Failed to set startup: ' + e, true);
        $startOnBoot.checked = !$startOnBoot.checked;
      }
    });

    // Validate theme name: alphanumeric, hyphens, underscores only
    function isValidTheme(name) {
      return /^[a-z0-9_-]{1,64}$/i.test(name);
    }

    // Build a new config object from current form values (immutable — no mutation of source)
    function buildConfigFromForm(cfg) {
      var themeValue = $theme.value.trim();
      return {
        config: {
          COM_PORT: $comPort.value,
          THEME: themeValue,
          HW_SENSORS: cfg.config.HW_SENSORS,
          ETH: cfg.config.ETH,
          WLO: cfg.config.WLO,
          CPU_FAN: cfg.config.CPU_FAN,
          PING: cfg.config.PING,
          WEATHER_API_KEY: '',
          WEATHER_LATITUDE: cfg.config.WEATHER_LATITUDE,
          WEATHER_LONGITUDE: cfg.config.WEATHER_LONGITUDE,
          WEATHER_UNITS: cfg.config.WEATHER_UNITS,
          WEATHER_LANGUAGE: cfg.config.WEATHER_LANGUAGE
        },
        display: {
          REVISION: $revision.value,
          BRIGHTNESS: parseInt($brightness.value, 10),
          DISPLAY_REVERSE: $displayReverse.checked,
          RESET_ON_STARTUP: $resetOnStartup.checked
        }
      };
    }

    async function loadConfig() {
      try {
        // Populate COM port list
        const ports = await invoke('list_serial_ports');
        for (const port of ports) {
          const opt = document.createElement('option');
          opt.value = port;
          opt.textContent = port;
          $comPort.appendChild(opt);
        }

        // Populate template dropdown dynamically
        try {
          const templates = await invoke('list_templates');
          $theme.innerHTML = '';
          for (const t of templates) {
            const opt = document.createElement('option');
            opt.value = t.name;
            opt.textContent = t.display_name + (t.is_builtin ? ' (built-in)' : '');
            $theme.appendChild(opt);
          }
        } catch (e) {
          // Fallback to hardcoded list if list_templates is not available
          console.warn('Could not load template list:', e);
        }

        // Load current config
        const cfg = await invoke('get_config');
        $comPort.value = cfg.config.COM_PORT || 'AUTO';
        $revision.value = cfg.display.REVISION || 'A';
        $brightness.value = cfg.display.BRIGHTNESS || 20;
        $brightnessValue.textContent = $brightness.value + '%';
        $displayReverse.checked = cfg.display.DISPLAY_REVERSE || false;
        $resetOnStartup.checked = cfg.display.RESET_ON_STARTUP !== false;
        $theme.value = cfg.config.THEME || 'v2';
      } catch (e) {
        showStatus('Failed to load config: ' + e, true);
      }
    }

    // Open Template Editor button
    document.getElementById('btn-editor').addEventListener('click', async () => {
      try {
        await invoke('open_editor');
      } catch (e) {
        showStatus('Failed to open editor: ' + e, true);
      }
    });

    document.getElementById('btn-save').addEventListener('click', async () => {
      if (!isValidTheme($theme.value.trim())) {
        showStatus('Invalid theme name. Use only letters, numbers, hyphens, and underscores.', true);
        return;
      }
      try {
        const cfg = await invoke('get_config');
        await invoke('save_config', { newConfig: buildConfigFromForm(cfg) });
        showStatus('Settings saved. Restart to apply changes.', false);
      } catch (e) {
        showStatus('Failed to save: ' + e, true);
      }
    });

    document.getElementById('btn-apply').addEventListener('click', async () => {
      if (!isValidTheme($theme.value.trim())) {
        showStatus('Invalid theme name. Use only letters, numbers, hyphens, and underscores.', true);
        return;
      }
      try {
        const cfg = await invoke('get_config');
        await invoke('save_config', { newConfig: buildConfigFromForm(cfg) });
        await invoke('restart_display');
        await invoke('reload_monitor');
        showStatus('Settings saved and applied!', false);
      } catch (e) {
        showStatus('Failed to apply: ' + e, true);
      }
    });

    document.getElementById('btn-cancel').addEventListener('click', () => {
      window.__TAURI__.window.getCurrent().close();
    });

    function showStatus(msg, isError) {
      $status.textContent = msg;
      $status.className = 'status ' + (isError ? 'error' : 'success');
      if (!isError) {
        setTimeout(() => { $status.textContent = ''; }, 3000);
      }
    }

    loadConfig();
  </script>
</body>
</html>
