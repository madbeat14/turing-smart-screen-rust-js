<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Turing Smart Screen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #00d4ff;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
    }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 14px;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #00d4ff;
    }
    .row {
      display: flex;
      gap: 16px;
    }
    .row .form-group { flex: 1; }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slider-group input[type="range"] {
      flex: 1;
      accent-color: #00d4ff;
    }
    .slider-group .value {
      width: 40px;
      text-align: right;
      font-size: 14px;
      color: #00d4ff;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      accent-color: #00d4ff;
      width: 16px;
      height: 16px;
    }
    .checkbox-group label {
      display: inline;
      color: #e0e0e0;
      font-size: 14px;
      margin-bottom: 0;
    }
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    button {
      padding: 8px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-save {
      background: #00d4ff;
      color: #1a1a2e;
      font-weight: 600;
    }
    .btn-save:hover { background: #00b8d9; }
    .btn-cancel {
      background: #333;
      color: #e0e0e0;
    }
    .btn-cancel:hover { background: #444; }
    .btn-apply {
      background: #4caf50;
      color: #fff;
      font-weight: 600;
    }
    .btn-apply:hover { background: #43a047; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      text-align: right;
      min-height: 20px;
    }
    .status.success { color: #4caf50; }
    .status.error { color: #f44336; }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="row">
    <div class="form-group">
      <label for="com-port">COM Port</label>
      <select id="com-port">
        <option value="AUTO">AUTO (detect)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="revision">Display Revision</label>
      <select id="revision">
        <option value="A">A — Turing 3.5"</option>
        <option value="B">B — XuanFang 3.5"</option>
        <option value="C">C — Turing 2"/5"/8.8"</option>
        <option value="D">D — Kipye Qiye 3.5"</option>
        <option value="WEACT_A">WeAct A — 3.5"</option>
        <option value="WEACT_B">WeAct B — 0.96"</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="brightness">Brightness</label>
    <div class="slider-group">
      <input type="range" id="brightness" min="0" max="100" value="20" />
      <span class="value" id="brightness-value">20%</span>
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="display-reverse" />
        <label for="display-reverse">Reverse display orientation</label>
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="reset-on-startup" checked />
        <label for="reset-on-startup">Reset display on startup</label>
      </div>
    </div>
  </div>

  <div class="form-group">
    <div class="checkbox-group">
      <input type="checkbox" id="start-on-boot" />
      <label for="start-on-boot">Start on Boot</label>
    </div>
  </div>

  <div class="form-group">
    <label for="theme">Theme</label>
    <input type="text" id="theme" value="default" />
  </div>

  <div class="actions">
    <button class="btn-cancel" id="btn-cancel">Cancel</button>
    <button class="btn-save" id="btn-save">Save</button>
    <button class="btn-apply" id="btn-apply">Save &amp; Apply</button>
  </div>
  <div class="status" id="status"></div>

  <script>
    const { invoke } = window.__TAURI__.core;

    const $comPort = document.getElementById('com-port');
    const $revision = document.getElementById('revision');
    const $brightness = document.getElementById('brightness');
    const $brightnessValue = document.getElementById('brightness-value');
    const $displayReverse = document.getElementById('display-reverse');
    const $resetOnStartup = document.getElementById('reset-on-startup');
    const $theme = document.getElementById('theme');
    const $status = document.getElementById('status');

    const $startOnBoot = document.getElementById('start-on-boot');

    $brightness.addEventListener('input', () => {
      $brightnessValue.textContent = $brightness.value + '%';
    });

    // Start on Boot — applied immediately (not part of config save)
    invoke('get_run_on_startup').then(enabled => {
      $startOnBoot.checked = enabled;
    });
    $startOnBoot.addEventListener('change', async () => {
      try {
        await invoke('set_run_on_startup', { enable: $startOnBoot.checked });
        showStatus($startOnBoot.checked ? 'Start on Boot enabled' : 'Start on Boot disabled', false);
      } catch (e) {
        showStatus('Failed to set startup: ' + e, true);
        $startOnBoot.checked = !$startOnBoot.checked;
      }
    });

    async function loadConfig() {
      try {
        // Populate COM port list
        const ports = await invoke('list_serial_ports');
        for (const port of ports) {
          const opt = document.createElement('option');
          opt.value = port;
          opt.textContent = port;
          $comPort.appendChild(opt);
        }

        // Load current config
        const cfg = await invoke('get_config');
        $comPort.value = cfg.config.COM_PORT || 'AUTO';
        $revision.value = cfg.display.REVISION || 'A';
        $brightness.value = cfg.display.BRIGHTNESS || 20;
        $brightnessValue.textContent = $brightness.value + '%';
        $displayReverse.checked = cfg.display.DISPLAY_REVERSE || false;
        $resetOnStartup.checked = cfg.display.RESET_ON_STARTUP !== false;
        $theme.value = cfg.config.THEME || 'default';
      } catch (e) {
        showStatus('Failed to load config: ' + e, true);
      }
    }

    document.getElementById('btn-save').addEventListener('click', async () => {
      try {
        const cfg = await invoke('get_config');
        cfg.config.COM_PORT = $comPort.value;
        cfg.config.THEME = $theme.value;
        cfg.display.REVISION = $revision.value;
        cfg.display.BRIGHTNESS = parseInt($brightness.value);
        cfg.display.DISPLAY_REVERSE = $displayReverse.checked;
        cfg.display.RESET_ON_STARTUP = $resetOnStartup.checked;

        await invoke('save_config', { newConfig: cfg });
        showStatus('Settings saved. Restart to apply changes.', false);
      } catch (e) {
        showStatus('Failed to save: ' + e, true);
      }
    });

    document.getElementById('btn-apply').addEventListener('click', async () => {
      try {
        const cfg = await invoke('get_config');
        cfg.config.COM_PORT = $comPort.value;
        cfg.config.THEME = $theme.value;
        cfg.display.REVISION = $revision.value;
        cfg.display.BRIGHTNESS = parseInt($brightness.value);
        cfg.display.DISPLAY_REVERSE = $displayReverse.checked;
        cfg.display.RESET_ON_STARTUP = $resetOnStartup.checked;

        await invoke('save_config', { newConfig: cfg });
        await invoke('restart_display');
        showStatus('Settings saved and applied!', false);
      } catch (e) {
        showStatus('Failed to apply: ' + e, true);
      }
    });

    document.getElementById('btn-cancel').addEventListener('click', () => {
      window.__TAURI__.window.getCurrent().close();
    });

    function showStatus(msg, isError) {
      $status.textContent = msg;
      $status.className = 'status ' + (isError ? 'error' : 'success');
      if (!isError) {
        setTimeout(() => { $status.textContent = ''; }, 3000);
      }
    }

    loadConfig();
  </script>
</body>
</html>
